---
services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: kafka-ui
    ports:
      - 18080:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: KUI@omega456
      KAFKA_CLUSTERS_0_NAME: aliyun-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: alikafka-serverless-cn-2ml4b9nrg01-1000-vpc.alikafka.aliyuncs.com:9092,alikafka-serverless-cn-2ml4b9nrg01-2000-vpc.alikafka.aliyuncs.com:9092,alikafka-serverless-cn-2ml4b9nrg01-3000-vpc.alikafka.aliyuncs.com:9092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
      KAFKA_CLUSTERS_0_READONLY: true
