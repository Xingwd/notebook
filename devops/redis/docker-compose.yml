services:
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: kPech+6D
    volumes:
      - redis:/data

  redis-insight:
    image: redis/redisinsight:2.68
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data

volumes:
  redis:
    external: false
  redis-insight:
    external: false
